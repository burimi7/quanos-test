name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build with env vars
        run: |
          echo "Building with VITE_API_KEY"
          npm run build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          
      - name: Verify env was passed (debug)
        run: |
          echo "Checking if build output contains API key reference"
          grep -r "VITE_API_KEY" dist/spa/assets/*.js || echo "API key not found in build files (this is normal if it's used dynamically)"
          
      - name: Copy 404.html
        run: cp dist/spa/index.html dist/spa/404.html
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/spa