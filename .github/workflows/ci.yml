name: Simple Build Test

on:
  push:
    branches: [ main ]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Try quasar build
        run: npx quasar build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}